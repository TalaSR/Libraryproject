{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Cyber Awareness Hub{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0d1117; color: #c9d1d9; }
        .navbar { background-color: #010409 !important; border-bottom: 1px solid #30363d; }
        .badge-High { background-color: #da3633; color: white; padding: 5px 10px; } 
        .badge-Medium { background-color: #d29922; color: white; padding: 5px 10px; } 
        .badge-Low { background-color: #238636; color: white; padding: 5px 10px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark mb-4 shadow">
        <div class="container">
            <a class="navbar-brand text-success font-monospace" href="{% url 'cyber_dashboard' %}">BACK TO DASHBOARD</a>
            <div class="d-flex">
                <a href="{% url 'threat_list' %}" class="btn btn-outline-success btn-sm me-2">Encyclopedia</a>
                <a href="{% url 'add_threat' %}" class="btn btn-success btn-sm me-2">+ Add Threat</a>
                <a href="{% url 'cyber_analytics' %}" class="btn btn-outline-warning btn-sm">Analytics</a>
            </div>
        </div>
    </nav>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
