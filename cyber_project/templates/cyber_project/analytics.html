{% extends 'cyber_project/base.html' %}

{% block content %}
<div class="py-5 text-center">
    <h2 class="mb-5 text-info font-monospace">System Analytics</h2>
    
    <div class="row justify-content-center">
        <div class="col-md-5 mb-4">
            <div class="card p-4 shadow bg-dark border-success h-100">
                <h4 class="text-secondary mb-3">Total Threats</h4>
                <div class="display-1 fw-bold text-success">{{ total }}</div>
                <p class="mt-3 text-muted">All security entries recorded</p>
            </div>
        </div>

        <div class="col-md-5 mb-4">
            <div class="card p-4 shadow bg-dark border-danger h-100">
                <h4 class="text-secondary mb-3">High Risk Threats</h4>
                <div class="display-1 fw-bold text-danger">{{ high_risk }}</div>
                <p class="mt-3 text-muted">Requires immediate attention</p>
            </div>
        </div>
    </div>

    <div class="mt-4">
        <p class="text-warning">High Risk Ratio: <strong>{{ risk_percent }}%</strong></p>
    </div>
</div>
{% endblock %}
