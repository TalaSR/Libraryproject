{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cyber Analytics</title>
    <link rel="icon" type="image/png" href="{% static 'favicon.png' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0d1117; color: #c9d1d9; }
        .navbar { background-color: #010409 !important; border-bottom: 1px solid #30363d; }
        .stat-card { background-color: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 30px; }
        .number { font-size: 4rem; font-weight: bold; color: #238636; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand text-success font-monospace" href="{% url 'cyber_dashboard' %}">BACK TO DASHBOARD</a>
        </div>
    </nav>

    <div class="container py-5 text-center">
        <h2 class="mb-5 text-info">System Analytics</h2>
        <div class="row justify-content-center">
            <div class="col-md-5 mb-4">
                <div class="stat-card shadow">
                    <h4>Total Threats Analyzed</h4>
                    <div class="number">{{ total }}</div>
                </div>
            </div>
            <div class="col-md-5 mb-4">
                <div class="stat-card shadow">
                    <h4>Critical High Risk</h4>
                    <div class="number" style="color: #da3633;">{{ high_risk }}</div>
                </div>
            </div>
        </div>
        <p class="mt-5 text-secondary">Data is synced in real-time from the HackHero Database.</p>
    </div>
</body>
</html>
