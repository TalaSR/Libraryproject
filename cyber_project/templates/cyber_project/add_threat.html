{% extends 'cyber_project/base.html' %}
{% load static %}

{% block title %}Add New Threat{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <h2 class="mb-4 text-center text-info">Add New Cyber Threat</h2>
            
            <div class="card p-4 shadow bg-dark text-light border-secondary">
                <form method="post" enctype="multipart/form-data"> {% csrf_token %}
                    
                    <div class="mb-3">
                        {{ form.as_p }}
                    </div>

                    <div class="text-center mt-4">
                        <button type="submit" class="btn btn-success btn-lg px-5">Save Threat</button>
                        <a href="{% url 'threat_list' %}" class="btn btn-outline-secondary btn-lg ms-2">Cancel</a>
                    </div>
                </form>
            </div>
            
            <p class="mt-3 text-muted small text-center italic">
                * All fields are required to keep our database accurate.
            </p>
        </div>
    </div>
</div>
{% endblock %}
