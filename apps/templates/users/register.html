{% extends 'layouts/base.html' %}

{% block content %}
<div class="container mt-5">
    <h2>User Registration</h2>
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-success">Register</button>
    </form>
    <p class="mt-3">Already have an account? <a href="/users/login">Login here</a></p>
</div>
{% endblock %}
