<!DOCTYPE html>
<html>
<head>
    <title>Lab 9 - Task 3</title>
</head>
<body>
    <h2>Publishers and Their Oldest Book Date</h2>
    <table border="1">
        <tr>
            <th>Publisher Name</th>
            <th>Oldest Book Release Date</th>
        </tr>
        {% for publisher in publishers %}
        <tr>
            <td>{{ publisher.name }}</td>
            <td>{{ publisher.oldest_book_date|default:"No Date Available" }}</td>
        </tr>
        {% endfor %}
    </table>
    <br>
    <a href="/books/lab9/task2">Back to Task 2</a>
</body>
</html>
