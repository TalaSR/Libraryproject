<!DOCTYPE html>
<html>
<head><title>Lab 9 - Task 2</title></head>
<body>
    <h2>Publishers and Total Book Stock</h2>
    <table border="1">
        <tr>
            <th>Publisher Name</th>
            <th>Total Stock (Quantity)</th>
        </tr>
        {% for publisher in publishers %}
        <tr>
            <td>{{ publisher.name }}</td>
            <td>{{ publisher.total_stock|default:0 }}</td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
