<!DOCTYPE html>
<html>
<head><title>Lab 9 - Task 1</title></head>
<body>
    <h2>Books Availability Percentage</h2>
    <table border="1">
        <tr>
            <th>Book Title</th>
            <th>Quantity</th>
            <th>Availability (%)</th>
        </tr>
        {% for book in books %}
        <tr>
            <td>{{ book.title }}</td>
            <td>{{ book.quantity }}</td>
            <td>{{ book.availability }}%</td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
