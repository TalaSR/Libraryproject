{% extends "layouts/base.html" %}
{% block content %}
    <h2>Books containing 'and':</h2>
    <ul>
        {% for obj in books %}
            <li>
                <strong>ID:</strong> {{ obj.id }} | 
                <strong>Title:</strong> {{ obj.title }} | 
                <strong>Author:</strong> {{ obj.author }}
            </li>
            <hr>
        {% empty %}
            <li>No books found.</li>
        {% endfor %}
    </ul>
{% endblock content %}
